version: "3.1"

rules:

- rule: Respond to greeting
  steps:
  - intent: greet
  - action: utter_greet

- rule: Search by toy type
  steps:
  - intent: search_by_type
  - action: utter_search_by_type

- rule: Search by age
  steps:
  - intent: search_by_age
  - action: utter_search_by_age

- rule: Search by group
  steps:
  - intent: search_by_group
  - action: utter_search_by_group

- rule: Search by price
  steps:
  - intent: search_by_price
  - action: utter_search_by_price

- rule: Search with combined filters
  steps:
  - intent: search_combined
  - action: utter_search_combined

- rule: Reserve a toy
  steps:
  - intent: reserve
  - action: utter_reserve

- rule: Handle NLU fallback
  steps:
  - intent: nlu_fallback
  - action: utter_fallback
